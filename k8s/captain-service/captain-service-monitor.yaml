apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: captain-service-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: captain-app
  endpoints:
  - port: "http-metrics" 
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - uber 