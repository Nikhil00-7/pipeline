apiVersion: v1
kind: PersistentVolume
metadata:
  name: captain-pv
spec:
  capacity:
    storage: 5Gi  
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data/captain
    type: DirectoryOrCreate  
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - k8s-worker 